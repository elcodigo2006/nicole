<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="El Truquito de la Abuela - Disfruta de la mejor comida tradicional ecuatoriana en Rubí. Encebollado, Fritada, Tigrillo y más con la sazón auténtica de la abuela.">
    <title>El Truquito de la Abuela | Comida Tradicional Ecuatoriana en Rubí</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ==========================================================================
           DESIGN SYSTEM & CUSTOM VARIABLES
           ========================================================================== */
        :root {
            /* Color Palette */
            --color-primary: #C2593F;      /* Terracotta */
            --color-primary-hover: #AB482E;
            --color-secondary: #EAA82C;    /* Mustard Gold */
            --color-secondary-hover: #D19120;
            --color-bg-dark: #121212;      /* Deep Slate/Carbon */
            --color-bg-card: #1A1A1A;      /* Darker grey for cards */
            --color-bg-accent: #242424;    /* Lighter grey for hover/highlight */
            --color-text-light: #EAE8E2;   /* Warm off-white */
            --color-text-muted: #A09E97;   /* Muted warm grey */
            --color-border: rgba(234, 168, 44, 0.15); /* Soft gold border */
            --color-border-focus: rgba(194, 89, 63, 0.4);
            --color-success: #10B981;     /* Active Green */
            --color-danger: #EF4444;      /* Closed Red */

            /* Typography */
            --font-heading: 'DM Serif Display', serif;
            --font-body: 'Outfit', sans-serif;

            /* Shadows & Transitions */
            --shadow-sm: 0 2px 4px rgba(0, 0, 0, 0.2);
            --shadow-md: 0 8px 16px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 16px 32px rgba(0, 0, 0, 0.6);
            --shadow-glow: 0 0 15px rgba(234, 168, 44, 0.25);
            --transition-fast: 0.2s ease;
            --transition-normal: 0.4s cubic-bezier(0.16, 1, 0.3, 1);

            /* Layout Constants */
            --container-max-width: 1200px;
            --border-radius-sm: 8px;
            --border-radius-md: 16px;
            --border-radius-lg: 24px;
        }

        /* RESET & BASE STYLES */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
            font-size: 16px;
        }

        body {
            background-color: var(--color-bg-dark);
            color: var(--color-text-light);
            font-family: var(--font-body);
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        img {
            max-width: 100%;
            height: auto;
            display: block;
        }

        a {
            color: inherit;
            text-decoration: none;
            transition: var(--transition-fast);
        }

        ul {
            list-style: none;
        }

        /* LAYOUT UTILITIES */
        .container {
            width: 90%;
            max-width: var(--container-max-width);
            margin: 0 auto;
            padding: 80px 0;
        }

        .text-center {
            text-align: center;
        }

        .margin-top-lg {
            margin-top: 40px;
        }

        /* Grid System Responsive */
        .grid {
            display: grid;
            gap: 30px;
        }

        .grid-2 { grid-template-columns: repeat(2, 1fr); }
        .grid-3 { grid-template-columns: repeat(3, 1fr); }
        .grid-4 { grid-template-columns: repeat(4, 1fr); }
        .align-items-center { align-items: center; }

        /* Section Headers */
        .section-header {
            margin-bottom: 50px;
        }

        .section-tag {
            display: inline-block;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--color-secondary);
            margin-bottom: 12px;
        }

        .section-title {
            font-family: var(--font-heading);
            font-size: 2.8rem;
            line-height: 1.2;
            color: var(--color-text-light);
            font-weight: 400;
        }

        .section-subtitle {
            font-size: 1.15rem;
            color: var(--color-text-muted);
            max-width: 600px;
            margin: 15px auto 0;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 28px;
            font-weight: 600;
            font-size: 0.95rem;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            transition: var(--transition-normal);
            gap: 8px;
        }

        .btn-primary {
            background-color: var(--color-primary);
            color: var(--color-text-light);
            box-shadow: 0 4px 15px rgba(194, 89, 63, 0.3);
        }

        .btn-primary:hover {
            background-color: var(--color-primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(194, 89, 63, 0.4);
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--color-text-light);
            border: 2px solid var(--color-border);
        }

        .btn-secondary:hover {
            border-color: var(--color-secondary);
            background-color: rgba(234, 168, 44, 0.05);
            transform: translateY(-2px);
        }

        .btn-lg {
            padding: 16px 36px;
            font-size: 1.05rem;
        }

        /* NAVBAR */
        .main-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            background-color: rgba(18, 18, 18, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: var(--transition-normal);
        }

        .main-header.scrolled {
            padding: 5px 0;
            background-color: rgba(18, 18, 18, 0.95);
            box-shadow: var(--shadow-md);
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            transition: var(--transition-normal);
        }

        .main-header.scrolled .header-container {
            padding: 12px 0;
        }

        .logo {
            display: flex;
            flex-direction: column;
            line-height: 1.1;
        }

        .logo-accent {
            font-family: var(--font-heading);
            font-size: 1.8rem;
            color: var(--color-secondary);
        }

        .logo-sub {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--color-text-light);
            font-weight: 500;
        }

        .nav-menu ul {
            display: flex;
            gap: 30px;
        }

        .nav-menu a {
            font-weight: 500;
            font-size: 0.95rem;
            color: var(--color-text-muted);
            position: relative;
            padding: 8px 0;
        }

        .nav-menu a:hover,
        .nav-menu a.active {
            color: var(--color-text-light);
        }

        .nav-menu a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background-color: var(--color-primary);
            transition: var(--transition-normal);
        }

        .nav-menu a:hover::after,
        .nav-menu a.active::after {
            width: 100%;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn-nav {
            padding: 8px 20px;
            font-size: 0.85rem;
        }

        .mobile-menu-toggle {
            display: none;
            background: transparent;
            border: none;
            cursor: pointer;
            flex-direction: column;
            justify-content: space-between;
            width: 24px;
            height: 18px;
        }

        .mobile-menu-toggle .bar {
            width: 100%;
            height: 2px;
            background-color: var(--color-text-light);
            border-radius: 4px;
            transition: var(--transition-fast);
        }

        .mobile-menu-toggle.open .bar:nth-child(1) {
            transform: translateY(8px) rotate(45deg);
        }

        .mobile-menu-toggle.open .bar:nth-child(2) {
            opacity: 0;
        }

        .mobile-menu-toggle.open .bar:nth-child(3) {
            transform: translateY(-8px) rotate(-45deg);
        }

        /* HERO SECTION */
        .hero-section {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            overflow: hidden;
            padding-top: 100px;
            padding-bottom: 60px;
        }

        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            z-index: 1;
            transform: scale(1.02);
            animation: zoomParallax 20s infinite alternate ease-in-out;
        }

        @keyframes zoomParallax {
            from { transform: scale(1); }
            to { transform: scale(1.08); }
        }

        .hero-container {
            position: relative;
            z-index: 2;
            width: 100%;
        }

        .hero-content {
            max-width: 650px;
        }

        .hero-subtitle {
            display: inline-block;
            color: var(--color-secondary);
            font-weight: 600;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 20px;
            position: relative;
            padding-left: 30px;
        }

        .hero-subtitle::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 2px;
            background-color: var(--color-secondary);
        }

        .hero-title {
            font-family: var(--font-heading);
            font-size: 4rem;
            line-height: 1.1;
            font-weight: 400;
            margin-bottom: 25px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .hero-text {
            font-size: 1.15rem;
            color: var(--color-text-muted);
            margin-bottom: 35px;
            max-width: 580px;
        }

        .hero-buttons {
            display: flex;
            gap: 20px;
        }

        .hero-badge {
            position: absolute;
            bottom: 50px;
            right: 5%;
            z-index: 2;
            background: rgba(26, 26, 26, 0.7);
            border: 1px solid var(--color-border);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 16px 24px;
            border-radius: var(--border-radius-md);
            box-shadow: var(--shadow-md);
        }

        .badge-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .badge-num {
            font-family: var(--font-heading);
            font-size: 1.8rem;
            color: var(--color-secondary);
            line-height: 1;
        }

        .badge-stars {
            font-size: 0.8rem;
            color: var(--color-secondary);
        }

        .badge-text {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--color-text-muted);
            margin-top: 4px;
        }

        /* HIGHLIGHTS CARDS */
        .highlights-section {
            background-color: var(--color-bg-card);
            border-top: 1px solid rgba(255,255,255,0.03);
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        .highlight-card {
            background-color: var(--color-bg-dark);
            padding: 40px;
            border-radius: var(--border-radius-md);
            border: 1px solid var(--color-border);
            transition: var(--transition-normal);
        }

        .highlight-card:hover {
            transform: translateY(-5px);
            border-color: var(--color-secondary);
            box-shadow: var(--shadow-glow);
        }

        .highlight-icon {
            font-size: 2rem;
            color: var(--color-primary);
            margin-bottom: 20px;
        }

        .highlight-card h3 {
            font-size: 1.35rem;
            font-weight: 500;
            margin-bottom: 12px;
        }

        .highlight-card p {
            color: var(--color-text-muted);
            font-size: 0.95rem;
        }

        /* ABOUT SECTION */
        .about-image-wrapper {
            position: relative;
            padding: 15px;
        }

        .about-image-wrapper::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 60%;
            height: 60%;
            border-top: 4px solid var(--color-primary);
            border-left: 4px solid var(--color-primary);
            z-index: 1;
        }

        .about-image-wrapper::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: 0;
            width: 60%;
            height: 60%;
            border-bottom: 4px solid var(--color-secondary);
            border-right: 4px solid var(--color-secondary);
            z-index: 1;
        }

        .about-image {
            width: 100%;
            height: 480px;
            object-fit: cover;
            border-radius: var(--border-radius-sm);
            box-shadow: var(--shadow-lg);
            filter: brightness(0.9);
        }

        .about-experience-badge {
            position: absolute;
            bottom: 40px;
            left: 40px;
            background-color: var(--color-primary);
            color: var(--color-text-light);
            padding: 20px 30px;
            border-radius: var(--border-radius-sm);
            box-shadow: var(--shadow-md);
            z-index: 2;
            display: flex;
            flex-direction: column;
            text-align: center;
        }

        .exp-years {
            font-family: var(--font-heading);
            font-size: 1.8rem;
            line-height: 1;
            font-weight: bold;
        }

        .exp-text {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 4px;
        }

        .about-content {
            padding-left: 30px;
        }

        .about-content h2 {
            margin-bottom: 25px;
        }

        .section-paragraph {
            font-size: 1.05rem;
            color: var(--color-text-muted);
            margin-bottom: 20px;
        }

        .about-signature {
            margin-top: 35px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .sig-text {
            display: flex;
            flex-direction: column;
        }

        .sig-title {
            font-family: var(--font-heading);
            font-size: 1.4rem;
            color: var(--color-secondary);
            line-height: 1.2;
        }

        .sig-subtitle {
            font-size: 0.8rem;
            color: var(--color-text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* MENU SECTION */
        .menu-section {
            background-color: var(--color-bg-card);
        }

        .menu-tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 50px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 20px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .tab-btn {
            background-color: transparent;
            border: none;
            color: var(--color-text-muted);
            font-family: var(--font-body);
            font-size: 1.05rem;
            font-weight: 500;
            padding: 12px 24px;
            cursor: pointer;
            border-radius: 50px;
            transition: var(--transition-normal);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab-btn i {
            font-size: 0.9rem;
        }

        .tab-btn:hover {
            color: var(--color-text-light);
            background-color: rgba(255,255,255,0.03);
        }

        .tab-btn.active {
            color: var(--color-text-light);
            background-color: var(--color-primary);
            box-shadow: 0 4px 12px rgba(194, 89, 63, 0.3);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .menu-featured-item {
            background-color: var(--color-bg-dark);
            border: 1px solid var(--color-border);
            border-radius: var(--border-radius-lg);
            overflow: hidden;
            margin-bottom: 40px;
            box-shadow: var(--shadow-md);
        }

        .featured-item-image-wrapper {
            position: relative;
            height: 100%;
            min-height: 350px;
        }

        .featured-item-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }

        .featured-badge {
            position: absolute;
            top: 20px;
            left: 20px;
            background-color: var(--color-secondary);
            color: var(--color-bg-dark);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 2px;
            padding: 6px 16px;
            border-radius: 50px;
            box-shadow: var(--shadow-sm);
        }

        .featured-item-details {
            padding: 50px;
        }

        .featured-item-details h3 {
            font-family: var(--font-heading);
            font-size: 2.2rem;
            font-weight: 400;
            margin-bottom: 15px;
            color: var(--color-secondary);
        }

        .featured-desc {
            color: var(--color-text-muted);
            font-size: 1.05rem;
            margin-bottom: 25px;
        }

        .featured-ingredients {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 30px;
        }

        .featured-ingredients li {
            font-size: 0.95rem;
            color: var(--color-text-light);
